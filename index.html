<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор тех карт — Good Dog</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #093023; --yellow: #ffcc00;
    --bg: #f4f7f4; --paper: #fff;
    --muted: #5a7a6a; --border: #c8d8c8; --r: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Golos Text", sans-serif; background: var(--bg); color: var(--green); }

  @media screen {
    .wrap { max-width: 940px; margin: 0 auto; padding: 28px 20px 80px; }

    header {
      display: flex; align-items: center; gap: 14px;
      border-bottom: 3px solid var(--green); padding-bottom: 14px; margin-bottom: 20px;
    }
    header img { height: 38px; }
    header h1 { font-family: "Unbounded", sans-serif; font-size: 16px; font-weight: 800; }
    header span { font-size: 12px; color: var(--muted); }

    /* API key bar */
    .api-bar {
      background: var(--paper); border: 1.5px solid var(--border);
      border-radius: var(--r); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }
    .api-bar .api-lbl { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
    .api-bar input {
      flex: 1; font-family: "Golos Text", sans-serif; font-size: 13px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      padding: 7px 11px; background: var(--bg); color: var(--green); outline: none;
    }
    .api-bar input:focus { border-color: var(--green); }
    .api-save {
      padding: 7px 16px; background: var(--green); color: var(--yellow);
      font-family: "Unbounded", sans-serif; font-size: 10px; font-weight: 700;
      border: none; border-radius: var(--r); cursor: pointer; white-space: nowrap; transition: opacity .15s;
    }
    .api-save:hover { opacity: .85; }
    .api-status { font-size: 11px; white-space: nowrap; }
    .api-status.ok { color: #2d8a4a; font-weight: 700; }
    .api-status.no { color: #aaa; }

    .sheet-meta {
      display: grid; grid-template-columns: 1fr auto;
      gap: 12px; align-items: end; margin-bottom: 24px;
    }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    input[type=text], input[type=number], input[type=password], select, textarea {
      font-family: "Golos Text", sans-serif; font-size: 14px;
      border: 1.5px solid var(--border); border-radius: var(--r);
      padding: 8px 11px; background: var(--paper); color: var(--green);
      outline: none; transition: border-color .15s; width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green); }
    textarea { resize: vertical; line-height: 1.55; }

    .add-pos-btn {
      padding: 10px 22px; background: var(--green); color: var(--yellow);
      font-family: "Unbounded", sans-serif; font-size: 11px; font-weight: 700;
      border: none; border-radius: var(--r); cursor: pointer; white-space: nowrap; transition: opacity .15s;
    }
    .add-pos-btn:hover { opacity: .85; }

    .pos-card { background: var(--paper); border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }

    .pos-head {
      background: var(--green); padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .pos-num { font-family: "Unbounded", sans-serif; font-size: 10px; font-weight: 700; color: #6aaa7a; white-space: nowrap; }
    .pos-name {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: "Unbounded", sans-serif; font-size: 13px; font-weight: 700;
      color: var(--yellow); padding: 0;
    }
    .pos-name::placeholder { color: #3a6a4a; }
    .head-field { display: flex; align-items: center; gap: 4px; }
    .head-lbl { font-size: 9px; color: #4a7a5a; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
    .head-inp {
      background: transparent; border: 1px solid #2a5a3a; color: var(--yellow);
      padding: 3px 6px; border-radius: 3px; font-size: 12px;
      font-family: "Golos Text", sans-serif; outline: none; width: auto;
    }
    .head-inp:focus { border-color: var(--yellow); }
    .head-sel {
      background: transparent; border: 1px solid #2a5a3a; color: var(--yellow);
      padding: 3px 4px; border-radius: 3px; font-size: 12px; outline: none; width: auto;
    }
    .head-sel option { background: var(--green); }
    .hbtn { background: none; border: none; cursor: pointer; font-size: 17px; padding: 2px 5px; border-radius: 3px; transition: background .15s; line-height: 1; }
    .hbtn:hover { background: rgba(255,255,255,.12); }
    .hbtn.dup { color: #a0d8b0; font-size: 14px; }
    .hbtn.del { color: #4a7a5a; font-size: 20px; }
    .hbtn.del:hover { color: #ffaa00; }

    .pos-body { padding: 14px; display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; }
    .slbl { font-family: "Unbounded", sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    .ing-tbl { width: 100%; border-collapse: collapse; }
    .ing-tbl th { background: var(--bg); font-size: 10px; font-weight: 700; color: var(--muted); padding: 5px 7px; text-align: left; border-bottom: 1px solid var(--border); }
    .ing-tbl td { padding: 4px 5px; border-bottom: 1px solid #eaf0ea; }
    .ing-tbl td input[type=text] { border: none; background: transparent; font-size: 14px; font-weight: 600; padding: 3px 4px; outline: none; width: 100%; }
    .ing-tbl td input[type=text]:focus { background: var(--bg); border-radius: 2px; }
    .ing-tbl td input[type=number] { border: none; background: transparent; font-size: 14px; font-weight: 700; color: var(--green); padding: 3px 4px; outline: none; width: 70px; }
    .ing-tbl td input[type=number]:focus { background: var(--bg); border-radius: 2px; }
    .ing-tbl td select { border: none; background: transparent; font-size: 13px; color: var(--muted); padding: 3px 2px; outline: none; }
    .del-ing { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; }
    .del-ing:hover { color: #c00; }
    .add-ing { margin-top: 7px; width: 100%; background: none; border: 1px dashed var(--border); border-radius: var(--r); padding: 6px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; transition: border-color .15s, color .15s; }
    .add-ing:hover { border-color: var(--green); color: var(--green); }

    .instr-col { display: flex; flex-direction: column; gap: 8px; }

    /* AI button */
    .ai-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; background: var(--yellow); color: var(--green);
      font-family: "Unbounded", sans-serif; font-size: 10px; font-weight: 700;
      border: none; border-radius: var(--r); cursor: pointer; transition: opacity .15s;
      align-self: flex-start;
    }
    .ai-btn:hover { opacity: .85; }
    .ai-btn:disabled { opacity: .5; cursor: not-allowed; }
    .ai-spinner {
      width: 11px; height: 11px; border: 2px solid var(--green);
      border-top-color: transparent; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .print-btn {
      display: block; width: 100%; padding: 15px;
      background: var(--green); color: var(--yellow);
      font-family: "Unbounded", sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; border: none;
      border-radius: var(--r); cursor: pointer; margin-top: 20px; transition: opacity .15s;
    }
    .print-btn:hover { opacity: .87; }
  }

  .print-preview { display: none; }

  @media print {
    @page { size: A4; margin: 10mm; }
    body { background: #fff; }
    .wrap { display: none !important; }
    .print-preview { display: block !important; }

    .sheet { width: 190mm; min-height: 277mm; display: flex; flex-direction: column; font-family: "Golos Text", sans-serif; color: #111; }

    .p-topbar { background: #093023; display: flex; align-items: center; justify-content: space-between; padding: 5mm 6mm; margin-bottom: 3mm; }
    .p-topbar img { height: 20pt; }
    .p-topbar-r { text-align: right; font-size: 7pt; color: #a0c8a0; line-height: 1.5; }

    .p-titlebar { background: #ffcc00; padding: 3mm 6mm; margin-bottom: 3mm; display: flex; justify-content: space-between; align-items: center; }
    .p-titlebar .sub { font-size: 6.5pt; font-weight: 700; letter-spacing: 1pt; text-transform: uppercase; color: #3a5a2a; }
    .p-titlebar .main { font-family: "Unbounded", sans-serif; font-size: 10.5pt; font-weight: 800; color: #093023; }
    .p-titlebar .cnt { font-family: "Unbounded", sans-serif; font-size: 7.5pt; font-weight: 700; color: #3a5a2a; }

    .p-grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 2.5mm; flex: 1; }

    .p-card { border: 0.8pt solid #c8d8c8; display: flex; flex-direction: column; overflow: hidden; break-inside: avoid; }

    .p-head { background: #093023; padding: 2mm 3mm; display: flex; align-items: center; gap: 4pt; flex-shrink: 0; }
    .p-num { font-family: "Unbounded", sans-serif; font-size: 6pt; font-weight: 700; color: #6aaa7a; }
    .p-name { font-family: "Unbounded", sans-serif; font-size: 8.5pt; font-weight: 800; color: #ffcc00; flex: 1; }
    .p-yield { font-size: 6.5pt; color: #a0d8a0; white-space: nowrap; }
    .p-cup { background: #ffcc00; color: #093023; font-family: "Unbounded", sans-serif; font-size: 6pt; font-weight: 800; padding: 1.5pt 4pt; border-radius: 2pt; white-space: nowrap; }

    .p-body { display: grid; grid-template-columns: 1.15fr 1fr; gap: 2.5mm; padding: 2.5mm 3mm; flex: 1; }

    .p-slbl { font-family: "Unbounded", sans-serif; font-size: 5pt; font-weight: 700; letter-spacing: 1.5pt; text-transform: uppercase; color: #888; border-bottom: 0.4pt solid #ddd; padding-bottom: 2pt; margin-bottom: 3pt; }

    table.p-ing { width: 100%; border-collapse: collapse; }
    table.p-ing thead th { font-size: 6.5pt; font-weight: 700; color: #888; padding: 2pt 3pt; text-align: left; background: #f4f8f4; border-bottom: 0.5pt solid #dde8dd; }
    table.p-ing tbody td { padding: 2.8pt 3pt; border-bottom: 0.3pt solid #eef2ee; }
    table.p-ing tbody td.name { font-weight: 600; font-size: 9pt; }
    table.p-ing tbody td.qty { font-weight: 800; font-size: 10pt; color: #093023; text-align: right; }
    table.p-ing tbody td.unit { font-size: 8pt; color: #666; }
    table.p-ing tbody tr:last-child td { border-bottom: none; }

    .p-instr { font-size: 7.5pt; line-height: 1.6; color: #111; white-space: pre-wrap; }

    .p-footer { margin-top: 2.5mm; display: flex; justify-content: space-between; font-size: 6pt; color: #ccc; border-top: 0.4pt solid #eee; padding-top: 2mm; }
  }
</style>
</head>

let pid = 0, ingC = {};

// ── API Key ──
function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  localStorage.setItem('gd_api_key', val);
  updateKeyStatus();
}

function getKey() {
  return localStorage.getItem('gd_api_key') || '';
}

function updateKeyStatus() {
  const k = getKey();
  const el = document.getElementById('api-status');
  const inp = document.getElementById('api-key-input');
  if (k) {
    el.textContent = '✓ Ключ сохранён';
    el.className = 'api-status ok';
    inp.value = k.slice(0,10) + '••••••••••••';
  } else {
    el.textContent = 'Не задан';
    el.className = 'api-status no';
  }
}

// ── Helpers ──
function escH(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Position ──
function addPos(d) {
  pid++;
  const id = pid;
  ingC[id] = 0;
  const div = document.createElement('div');
  div.className = 'pos-card'; div.id = 'pos-' + id;
  div.innerHTML = `
    <div class="pos-head">
      <span class="pos-num">№${id}</span>
      <input class="pos-name" type="text" placeholder="Название напитка / блюда"
        id="pname-${id}" value="${d ? escH(d.name) : ''}">
      <div class="head-field">
        <span class="head-lbl">Выход</span>
        <input class="head-inp" type="number" id="pyv-${id}" placeholder="300" min="0" style="width:58px" value="${d ? d.yv : ''}">
        <select class="head-sel" id="pyu-${id}">
          ${['мл','л','г','кг','шт'].map(u=>`<option${d&&d.yu===u?' selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="head-field">
        <span class="head-lbl">Стакан</span>
        <input class="head-inp" type="text" id="pcup-${id}" placeholder="M / L" style="width:70px" value="${d ? escH(d.cup||'') : ''}">
      </div>
      <button class="hbtn dup" onclick="dupPos(${id})" title="Дублировать">⧉</button>
      <button class="hbtn del" onclick="rmPos(${id})" title="Удалить">×</button>
    </div>
    <div class="pos-body">
      <div>
        <div class="slbl">Состав</div>
        <table class="ing-tbl">
          <thead>
            <tr>
              <th style="width:42%">Ингредиент</th>
              <th style="width:22%">Кол-во</th>
              <th style="width:20%">Ед.</th>
              <th style="width:8%"></th>
            </tr>
          </thead>
          <tbody id="ib-${id}"></tbody>
        </table>
        <button class="add-ing" onclick="addIng(${id})">+ ингредиент</button>
      </div>
      <div class="instr-col">
        <div class="slbl">Инструкция приготовления</div>
        <button class="ai-btn" id="aibtn-${id}" onclick="genInstr(${id})">
          ✦ Сгенерировать / Улучшить
        </button>
        <textarea id="pinstr-${id}" placeholder="1. ...\n2. ...\n3. ..." style="min-height:130px;flex:1">${d ? escH(d.instr) : ''}</textarea>
      </div>
    </div>
  `;
  document.getElementById('pos-list').appendChild(div);
  if (d && d.ings && d.ings.length) {
    d.ings.forEach(i => addIng(id, i.name, i.qty, i.unit));
  } else {
    addIng(id); addIng(id); addIng(id);
  }
  updateNums();
}

function dupPos(id) {
  addPos(getPosData(id));
  const cards = document.querySelectorAll('.pos-card');
  cards[cards.length-1].scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function rmPos(id) {
  document.getElementById('pos-'+id)?.remove();
  updateNums();
}

function updateNums() {
  document.querySelectorAll('.pos-card').forEach((c,i) => {
    c.querySelector('.pos-num').textContent = '№'+(i+1);
  });
}

function addIng(id, name, qty, unit) {
  ingC[id] = (ingC[id]||0) + 1;
  const iid = id+'_'+ingC[id];
  const tr = document.createElement('tr');
  tr.id = 'i-'+iid;
  tr.innerHTML = `
    <td><input type="text" placeholder="Молоко" value="${name ? escH(name) : ''}"></td>
    <td><input type="number" placeholder="0" min="0" step="0.01" value="${qty||''}"></td>
    <td><select>${['г','кг','мл','л','шт'].map(u=>`<option${u===(unit||'г')?' selected':''}>${u}</option>`).join('')}</select></td>
    <td><button class="del-ing" onclick="document.getElementById('i-${iid}').remove()">×</button></td>
  `;
  document.getElementById('ib-'+id).appendChild(tr);
}

function getIngs(id) {
  return Array.from(document.querySelectorAll(`#ib-${id} tr`)).map(tr => {
    const ti = tr.querySelectorAll('input[type=text]');
    const ni = tr.querySelectorAll('input[type=number]');
    const sel = tr.querySelector('select');
    return { name: ti[0]?.value||'', qty: parseFloat(ni[0]?.value)||0, unit: sel?.value||'' };
  }).filter(i => i.name || i.qty);
}

function getPosData(id) {
  return {
    name:  document.getElementById('pname-'+id)?.value||'',
    yv:    document.getElementById('pyv-'+id)?.value||'',
    yu:    document.getElementById('pyu-'+id)?.value||'мл',
    cup:   document.getElementById('pcup-'+id)?.value||'',
    instr: document.getElementById('pinstr-'+id)?.value||'',
    ings:  getIngs(id)
  };
}

// ── AI ──
async function genInstr(id) {
  const key = getKey();
  if (!key) {
    alert('Сначала введи и сохрани Anthropic API Key вверху страницы');
    return;
  }

  const name  = document.getElementById('pname-'+id)?.value || '';
  const ings  = getIngs(id).filter(i => i.name);
  const existing = document.getElementById('pinstr-'+id)?.value?.trim() || '';

  if (!name && !ings.length && !existing) {
    alert('Заполни название или ингредиенты');
    return;
  }

  const ingText = ings.map(i => `${i.name} — ${i.qty} ${i.unit}`).join('\n');

  let prompt;
  if (existing) {
    prompt = `Ты — профессиональный технолог кафе. Улучши и исправь инструкцию приготовления напитка/блюда для сотрудника кафе. Исправь грамматику, сделай текст чётким и профессиональным, сохрани смысл.

Название: ${name || 'не указано'}
Ингредиенты:
${ingText || 'не указаны'}

Текущая инструкция (улучши её):
${existing}

Требования:
- На русском языке
- Нумерованный список, каждый шаг с новой строки
- Конкретно: температура, время, порядок действий
- 4–8 шагов
- Только сам текст инструкции, без пояснений`;
  } else {
    prompt = `Ты — профессиональный технолог кафе. Напиши чёткую пошаговую инструкцию приготовления для сотрудника кафе.

Название: ${name || 'не указано'}
Ингредиенты:
${ingText || 'не указаны'}

Требования:
- На русском языке
- Нумерованный список, каждый шаг с новой строки
- Конкретно: температура, время, порядок действий
- 4–8 шагов
- Только сам текст инструкции, без пояснений`;
  }

  const btn = document.getElementById('aibtn-'+id);
  btn.disabled = true;
  btn.innerHTML = '<span class="ai-spinner"></span> Генерирую...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-browser': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.map(b => b.text||'').join('') || '';
    if (text) document.getElementById('pinstr-'+id).value = text.trim();
    else alert('ИИ не ответил, попробуй ещё раз');
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }

  btn.disabled = false;
  btn.innerHTML = '✦ Сгенерировать / Улучшить';
}

// ── Print ──
function buildPrint() {
  const cards = Array.from(document.querySelectorAll('.pos-card'));
  const title = document.getElementById('sheet-title').value || 'Тех карта';
  const today = new Date().toLocaleDateString('ru-RU');
  const n = cards.length;
  const suffix = n===1?'позиция':n<5?'позиции':'позиций';

  const cardsHTML = cards.map((card, idx) => {
    const id = card.id.replace('pos-','');
    const d  = getPosData(id);
    const ingRows = d.ings.length
      ? d.ings.map(i=>`<tr><td class="name">${escH(i.name)}</td><td class="qty">${i.qty}</td><td class="unit">${i.unit}</td></tr>`).join('')
      : `<tr><td colspan="3" style="color:#aaa;font-style:italic;font-size:8pt">—</td></tr>`;
    const cupHTML = d.cup ? `<span class="p-cup">${escH(d.cup)}</span>` : '';

    return `
      <div class="p-card">
        <div class="p-head">
          <span class="p-num">${idx+1}</span>
          <span class="p-name">${escH(d.name)||'Без названия'}</span>
          <span class="p-yield">${d.yv||'?'} ${d.yu}</span>
          ${cupHTML}
        </div>
        <div class="p-body">
          <div>
            <div class="p-slbl">Состав</div>
            <table class="p-ing">
              <thead><tr><th>Ингредиент</th><th style="text-align:right">Кол-во</th><th>Ед.</th></tr></thead>
              <tbody>${ingRows}</tbody>
            </table>
          </div>
          <div>
            <div class="p-slbl">Приготовление</div>
            <div class="p-instr">${escH(d.instr)||'—'}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('sheet-out').innerHTML = `
    <div class="p-topbar">
      <img src="${LOGO}" alt="Good Dog">
      <div class="p-topbar-r">Рабочая карта сотрудника<br>Астана · ${today}</div>
    </div>
    <div class="p-titlebar">
      <div><div class="sub">Good Dog</div><div class="main">${escH(title)}</div></div>
      <div class="cnt">${n} ${suffix}</div>
    </div>
    <div class="p-grid">${cardsHTML}</div>
    <div class="p-footer">
      <span>Good Dog — только для внутреннего использования</span>
      <span>${today}</span>
    </div>`;
}

// ── Init ──
updateKeyStatus();
